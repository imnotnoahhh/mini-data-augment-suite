# Augmentation pipeline and search grids
baseline:
  resize:
    name: random_resized_crop
    params:
      size: 224
      scale: [1.0, 1.0]
      ratio: [1.0, 1.0]
      interpolation: bicubic
      antialias: true
  hflip:
    name: horizontal_flip
    params:
      p: 0.5
  affine:
    name: random_affine
    params:
      degrees: 0
      translate: [0.0, 0.0]
      shear: [0.0, 0.0]
      interpolation: bicubic
  color:
    name: color_jitter
    params:
      brightness: 0.0
      contrast: 0.0
      saturation: 0.0
      hue: 0.0
  blur:
    name: gaussian_blur
    params:
      kernel_size: 3
      sigma: [0.1, 0.1]
      p: 0.0
  grayscale:
    name: random_grayscale
    params:
      p: 0.0
  erasing:
    name: random_erasing
    params:
      p: 0.0
      scale: [0.02, 0.33]
      ratio: [0.3, 3.3]
  normalize:
    name: normalize
    params:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

search_space:
  hflip:
    target: hflip
    parameter: p
    values: [0.0, 0.25, 0.5, 0.75, 1.0]
    refine:
      window: 0.1
      step: 0.05
  rotate:
    target: affine
    parameter: degrees
    values: [0, 5, 10, 15]
    refine:
      window: 4
      step: 2
  translate:
    target: affine
    parameter: translate
    values: [0.0, 0.02, 0.04, 0.08, 0.12]
  shear:
    target: affine
    parameter: shear
    values: [0, 5, 10, 15]
  rrc_scale:
    target: resize
    parameter: scale
    values:
      - [1.0, 1.0]
      - [0.9, 1.0]
      - [0.8, 1.0]
      - [0.7, 1.0]
      - [0.6, 1.0]
  brightness:
    target: color
    parameter: brightness
    values: [0.1, 0.2, 0.3, 0.4]
  contrast:
    target: color
    parameter: contrast
    values: [0.1, 0.2, 0.3, 0.4]
  saturation:
    target: color
    parameter: saturation
    values: [0.1, 0.2, 0.3, 0.4]
  hue:
    target: color
    parameter: hue
    values: [0.02, 0.04, 0.06, 0.08]
  blur:
    target: blur
    parameter: p
    values: [0.0, 0.1, 0.3, 0.5]
  blur_sigma:
    target: blur
    parameter: sigma
    values:
      - [0.1, 0.1]
      - [0.5, 0.5]
      - [1.0, 1.0]
      - [2.0, 2.0]
  grayscale:
    target: grayscale
    parameter: p
    values: [0.0, 0.1, 0.2, 0.3]
  erasing:
    target: erasing
    parameter: p
    values: [0.0, 0.25, 0.5]
  erasing_scale:
    target: erasing
    parameter: scale
    values:
      - [0.02, 0.33]
      - [0.05, 0.33]
      - [0.08, 0.33]

combos:
  baseline:
    ops: []
  fast_candidates:
    - ["hflip:p=0.5"]
    - ["hflip:p=0.5", "rotate:degrees=10"]
    - ["hflip:p=0.5", "rotate:degrees=10", "brightness=0.2"]
